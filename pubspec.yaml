name: vroom
description: "Mobile application for career guidance VR-quest with augmented reality features."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_bloc: ^9.1.1
  go_router: ^17.1.0
  get_it: ^9.2.1
  json_annotation: ^4.11.0
  freezed_annotation: ^3.1.0
  logger: ^2.6.2
  dio: ^5.9.1
  equatable: ^2.0.8
  dartz: ^0.10.1
  shared_preferences: ^2.5.4
  flutter_secure_storage: ^10.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  freezed: ^3.2.5
  build_runner: ^2.11.1
  json_serializable: ^6.13.0

flutter:

  uses-material-design: true

  assets:
    - assets/images/
